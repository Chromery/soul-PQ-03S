name: soul-prospect-qualifier

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soul_pq}
      POSTGRES_USER: ${POSTGRES_USER:-soul}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soul_dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soul} -d ${POSTGRES_DB:-soul_pq}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://soul:soul_dev_password@postgres:5432/soul_pq?schema=public}
      CORS_ORIGIN: http://localhost:${WEB_PORT:-8080},http://localhost:5173
      DEFAULT_TECHNICAL_OWNER: ${DEFAULT_TECHNICAL_OWNER:-Responsabile tecnico Soul}
      ERP_SYNC_TOKEN: ${ERP_SYNC_TOKEN:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-west-004}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX:-erp}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SCALE_MODEL: ${OPENROUTER_SCALE_MODEL:-qwen/qwen3.5-flash-02-23}
      OPENROUTER_PDF_ENGINE: ${OPENROUTER_PDF_ENGINE:-mistral-ocr}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:${WEB_PORT:-8080}}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Soul Prospect Qualifier}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
